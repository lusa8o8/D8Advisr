<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>D8Advisr — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #F7F7F7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }
    .logo span { color: #FF5A5F; }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      line-height: 1;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #222222;
      margin-bottom: 8px;
    }
    p {
      color: #555555;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: #FF5A5F;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>D8</span>Advisr</div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again.<br />Your saved plans are waiting for you.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
